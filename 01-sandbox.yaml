apiVersion: agents.x-k8s.io/v1alpha1
kind: Sandbox
metadata:
  name: hello-sandbox
  namespace: urunc-tutorial
spec:
  podTemplate:
    spec:
      runtimeClassName: urunc
      dnsPolicy: None
      dnsConfig:
        nameservers:
        - 8.8.8.8
      containers:
      - name: executor
        image: harbor.nbfc.io/nubificus/urunc-sandbox-qemu-minimal:latest
        ports:
        - containerPort: 8080
